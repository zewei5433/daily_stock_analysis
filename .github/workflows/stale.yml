# 自動關閉過期的 Issues 和 PR
# 每天檢查一次，標記長時間無回應的 issues/PRs

name: Stale Issues & PRs

on:
  schedule:
    # 每天 UTC 0:00（台北時間 8:00）檢查一次
    - cron: '0 0 * * *'
  # 支援手動觸發
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: 🧹 清理過期 Issues/PRs
    runs-on: ubuntu-latest

    steps:
      - name: 🏷️ 標記並關閉過期內容
        uses: actions/stale@v10
        with:
          # ===== Issue 設定 =====
          days-before-issue-stale: 7
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: |
            👋 這個 Issue 已經 **7 天**沒有活動了。

            如果問題仍然存在，請回覆說明最新情況，我們會繼續跟進。
            如果問題已解決或不再需要，可以直接關閉此 Issue。

            **如果 7 天內沒有回覆，此 Issue 將自動關閉。**
          close-issue-message: |
            🔒 由於長時間沒有活動，此 Issue 已自動關閉。

            如果問題仍然存在，歡迎重新開啟或建立新的 Issue。

          # ===== PR 設定 =====
          days-before-pr-stale: 21
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            👋 這個 PR 已經 **21 天**沒有活動了。

            請檢查是否需要：
            - 解決合併衝突
            - 回覆 review 意見
            - 更新程式碼

            **如果 14 天內沒有更新，此 PR 將自動關閉。**
          close-pr-message: |
            🔒 由於長時間沒有活動，此 PR 已自動關閉。

            如果仍希望合併這些變更，請重新開啟或建立新的 PR。

          # ===== 排除規則 =====
          # 帶有這些標籤的不會被標記為 stale
          exempt-issue-labels: 'pinned,security,enhancement,help wanted,good first issue'
          exempt-pr-labels: 'pinned,security,work-in-progress,wip'

          # 排除草稿 PR
          exempt-draft-pr: true

          # ===== 其他設定 =====
          # 每次執行最多處理數量
          operations-per-run: 50

          # 僅處理這些狀態
          only-labels: ''

          # 移除 stale 標籤（當有新活動時）
          remove-stale-when-updated: true

          # 除錯模式（true 時只顯示不執行）
          debug-only: false
